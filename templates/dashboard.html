<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Banking Platform Health Monitor</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }
    header {
      background: linear-gradient(135deg, #1e3a5f, #1d4ed8);
      padding: 18px 32px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 2px solid #3b82f6;
    }
    header h1 { font-size: 1.3rem; font-weight: 700; }
    header span { font-size: 0.8rem; color: #93c5fd; }
    #live-badge { background: #22c55e; color: #fff; font-size: 0.72rem; padding: 3px 10px; border-radius: 20px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    .main { padding: 24px 32px; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 16px; margin-bottom: 24px; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 18px; text-align: center; }
    .card .val { font-size: 2rem; font-weight: 700; margin: 6px 0 4px; }
    .card .lbl { font-size: 0.72rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
    .card.green .val { color: #22c55e; }
    .card.red   .val { color: #ef4444; }
    .card.blue  .val { color: #60a5fa; }
    .card.yellow .val { color: #facc15; }
    .card.purple .val { color: #c084fc; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    @media (max-width: 900px) { .grid2 { grid-template-columns: 1fr; } }
    .panel { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; }
    .panel h2 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: #93c5fd; margin-bottom: 16px; border-bottom: 1px solid #334155; padding-bottom: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th { color: #64748b; font-weight: 600; text-align: left; padding: 6px 10px; border-bottom: 1px solid #334155; }
    td { padding: 7px 10px; border-bottom: 1px solid #1e293b; }
    tr:hover td { background: #0f172a; }
    .badge { padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
    .badge.up   { background: #14532d; color: #4ade80; }
    .badge.down { background: #450a0a; color: #f87171; }
    .badge.warn { background: #451a03; color: #fb923c; }
    .badge.crit { background: #450a0a; color: #f87171; }
    .ep-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #334155; }
    .ep-row:last-child { border: none; }
    .ep-name { font-family: monospace; font-size: 0.85rem; color: #7dd3fc; }
    .ep-stats { font-size: 0.78rem; color: #94a3b8; }
    .uptime-bar { height: 6px; border-radius: 4px; background: #334155; margin-top: 4px; width: 120px; }
    .uptime-fill { height: 100%; border-radius: 4px; background: #22c55e; }
    .refresh-btn { background: #1d4ed8; color: #fff; border: none; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 0.82rem; margin-bottom: 20px; }
    .refresh-btn:hover { background: #2563eb; }
    #last-updated { font-size: 0.75rem; color: #64748b; margin-left: 12px; }
  </style>
</head>
<body>
<header>
  <h1>🏦 Banking Platform Health Monitor</h1>
  <div style="display:flex;align-items:center;gap:12px;">
    <span>Simulated AWS CloudWatch Dashboard</span>
    <span id="live-badge">● LIVE</span>
    <a href="/logout" style="background:#ef4444;color:#fff;padding:5px 14px;border-radius:20px;text-decoration:none;font-size:0.78rem;font-weight:600;">
      Logout
    </a>
  </div>
</header>
<div class="main">
  <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  <span id="last-updated"></span>
  <div class="cards" id="cards"></div>
  <div class="grid2">
    <div class="panel">
      <h2>API Latency (Last 20 checks)</h2>
      <canvas id="latencyChart" height="180"></canvas>
    </div>
    <div class="panel">
      <h2>EC2 CPU & Memory (%)</h2>
      <canvas id="cpuChart" height="180"></canvas>
    </div>
  </div>
  <div class="grid2">
    <div class="panel">
      <h2>Endpoint Uptime</h2>
      <div id="ep-list"></div>
    </div>
    <div class="panel">
      <h2>Recent Incidents / Alarms</h2>
      <table>
        <thead><tr><th>Time</th><th>Alarm</th><th>Severity</th></tr></thead>
        <tbody id="incidents-body"></tbody>
      </table>
    </div>
  </div>
  <div class="panel" style="margin-top:20px;">
    <h2>Recent Health Checks</h2>
    <table>
      <thead><tr><th>Time</th><th>Endpoint</th><th>Status</th><th>Latency</th><th>CPU%</th><th>Mem%</th><th>Up?</th></tr></thead>
      <tbody id="metrics-body"></tbody>
    </table>
  </div>
</div>
<script>
let latencyChart, cpuChart;
async function loadData() {
  try {
    const r = await fetch('/api/dashboard');
    const d = await r.json();
    document.getElementById('cards').innerHTML = `
      <div class="card green"><div class="val">${d.uptime_pct}%</div><div class="lbl">Uptime</div></div>
      <div class="card blue"><div class="val">${d.avg_latency}ms</div><div class="lbl">Avg Latency</div></div>
      <div class="card ${d.avg_cpu > 80 ? 'red' : 'yellow'}"><div class="val">${d.avg_cpu}%</div><div class="lbl">Avg CPU</div></div>
      <div class="card purple"><div class="val">${d.avg_memory}%</div><div class="lbl">Avg Memory</div></div>
      <div class="card ${d.total_incidents > 0 ? 'red' : 'green'}"><div class="val">${d.total_incidents}</div><div class="lbl">Incidents</div></div>
      <div class="card blue"><div class="val">${d.total_checks}</div><div class="lbl">Total Checks</div></div>
    `;
    const labels  = d.recent_metrics.map(m => m[0].slice(11,19)).reverse();
    const latency = d.recent_metrics.map(m => m[3]).reverse();
    const cpuData = d.recent_metrics.map(m => m[4]).reverse();
    const memData = d.recent_metrics.map(m => m[5]).reverse();
    if (latencyChart) latencyChart.destroy();
    if (cpuChart)     cpuChart.destroy();
    latencyChart = new Chart(document.getElementById('latencyChart'), {
      type: 'line',
      data: { labels, datasets: [{ label: 'Latency (ms)', data: latency, borderColor: '#60a5fa', backgroundColor: 'rgba(96,165,250,0.1)', tension: 0.4, fill: true }] },
      options: { plugins: { legend: { labels: { color: '#94a3b8' } } }, scales: { x: { ticks: { color: '#64748b' }, grid: { color: '#1e293b' } }, y: { ticks: { color: '#64748b' }, grid: { color: '#334155' } } } }
    });
    cpuChart = new Chart(document.getElementById('cpuChart'), {
      type: 'line',
      data: { labels, datasets: [
        { label: 'CPU%',    data: cpuData, borderColor: '#facc15', backgroundColor: 'rgba(250,204,21,0.08)', tension: 0.4, fill: true },
        { label: 'Memory%', data: memData, borderColor: '#c084fc', backgroundColor: 'rgba(192,132,252,0.08)', tension: 0.4, fill: true }
      ]},
      options: { plugins: { legend: { labels: { color: '#94a3b8' } } }, scales: { x: { ticks: { color: '#64748b' }, grid: { color: '#1e293b' } }, y: { max: 100, ticks: { color: '#64748b' }, grid: { color: '#334155' } } } }
    });
    document.getElementById('ep-list').innerHTML = d.endpoint_stats.map(ep => `
      <div class="ep-row">
        <div>
          <div class="ep-name">${ep[0]}</div>
          <div class="ep-stats">Checks: ${ep[1]} | Avg: ${ep[3]}ms</div>
          <div class="uptime-bar"><div class="uptime-fill" style="width:${ep[4]}%"></div></div>
        </div>
        <span class="badge ${ep[4] >= 99 ? 'up' : ep[4] >= 95 ? 'warn' : 'down'}">${ep[4]}%</span>
      </div>`).join('');
    document.getElementById('incidents-body').innerHTML = d.recent_incidents.length
      ? d.recent_incidents.map(i => `<tr><td>${i[0].slice(11,19)}</td><td style="font-size:0.78rem">${i[1]}</td><td><span class="badge ${i[3]==='CRITICAL'?'crit':'warn'}">${i[3]}</span></td></tr>`).join('')
      : '<tr><td colspan="3" style="color:#64748b;text-align:center;padding:16px">No incidents 🎉</td></tr>';
    document.getElementById('metrics-body').innerHTML = d.recent_metrics.map(m =>
      `<tr><td>${m[0].slice(11,19)}</td><td style="font-family:monospace;font-size:0.78rem;color:#7dd3fc">${m[1]}</td><td>${m[2]}</td><td>${m[3]}ms</td><td>${m[4]}%</td><td>${m[5]}%</td><td><span class="badge ${m[6]?'up':'down'}">${m[6]?'UP':'DOWN'}</span></td></tr>`
    ).join('');
    document.getElementById('last-updated').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
  } catch(e) { console.error(e); }
}
loadData();
setInterval(loadData, 15000);
</script>
</body>
</html>
